<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="inscription.html" class="active">Inscription</a></li>
                <li><a href="tableau.html">Tableau des inscrits</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="form-section">
            <h1>Formulaire d'inscription</h1>
            <p class="intro-text">
                Inscrivez-vous sur notre plateforme afin d'obtenir les dernières tendances dans le domaine du
                développement Web.
            </p>

            <form class="inscription-form" action="#" method="POST">
                <!-- Section Informations Personnelles -->
                <fieldset class="form-fieldset">
                    <legend class="fieldset-title">Informations Personnelles</legend>

                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" required placeholder="Votre prénom">
                    </div>

                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" required placeholder="Votre nom">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="votre.email@exemple.com">
                    </div>

                    <div class="form-group">
                        <label>Sexe</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="homme" name="sexe" value="homme" required>
                                <label for="homme">Homme</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="femme" name="sexe" value="femme" required>
                                <label for="femme">Femme</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="adresse">Adresse</label>
                        <select id="adresse" name="adresse" required>
                            <option value="">-- Sélectionnez une adresse --</option>
                            <option value="dakar">Dakar</option>
                            <option value="pikine">Pikine</option>
                            <option value="guediawaye">Guédiawaye</option>
                            <option value="rufisque">Rufisque</option>
                            <option value="keur-massar">Keur Massar</option>
                        </select>
                    </div>
                </fieldset>

                <!-- Section Coordonnées -->
                <fieldset class="form-fieldset">
                    <legend class="fieldset-title">Coordonnées</legend>

                    <div class="form-group">
                        <label for="telephone">Numéro de téléphone</label>
                        <input type="tel" id="telephone" name="telephone" required placeholder="+221 XX XXX XX XX">
                    </div>

                    <div class="form-group">
                        <label>Ce numéro est-il sur WhatsApp ?</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="whatsapp-oui" name="whatsapp" value="oui" required>
                                <label for="whatsapp-oui">Oui</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="whatsapp-non" name="whatsapp" value="non" required>
                                <label for="whatsapp-non">Non</label>
                            </div>
                        </div>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Envoyer</button>
                    <button type="reset" class="btn btn-secondary">Réinitialiser</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Plateforme de développement Web. Tous droits réservés.</p>
    </footer>
</body>

</html>
